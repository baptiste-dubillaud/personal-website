services:
  personal-website:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Main router (www)
      - "traefik.http.routers.personal-website.rule=Host(`www.dubillaudb.private.dubillaudb.fr`)"
      - "traefik.http.routers.personal-website.entrypoints=websecure"
      - "traefik.http.routers.personal-website.tls=true"
      - "traefik.http.routers.personal-website.tls.certresolver=letsencrypt"
      - "traefik.http.services.personal-website.loadbalancer.server.port=3000"
      # Redirect non-www → www
      - "traefik.http.routers.personal-website-redirect.rule=Host(`dubillaudb.private.dubillaudb.fr`)"
      - "traefik.http.routers.personal-website-redirect.entrypoints=websecure"
      - "traefik.http.routers.personal-website-redirect.tls=true"
      - "traefik.http.routers.personal-website-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.personal-website-redirect.middlewares=redirect-to-www"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https://dubillaudb.private.dubillaudb\\.fr(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://www.dubillaudb.private.dubillaudb.fr$${1}"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"

networks:
  traefik-public:
    external: true
