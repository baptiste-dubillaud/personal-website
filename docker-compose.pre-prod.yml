services:
  personal-website-pre-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Main router (www)
      - "traefik.http.routers.personal-website-pre-prod.rule=Host(`www.pprod.dubillaudb.fr`)"
      - "traefik.http.routers.personal-website-pre-prod.entrypoints=websecure"
      - "traefik.http.routers.personal-website-pre-prod.tls=true"
      - "traefik.http.routers.personal-website-pre-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.personal-website-pre-prod.loadbalancer.server.port=3000"
      # Redirect non-www → www
      - "traefik.http.routers.personal-website-pre-prod-redirect.rule=Host(`pprod.dubillaudb.fr`)"
      - "traefik.http.routers.personal-website-pre-prod-redirect.entrypoints=websecure"
      - "traefik.http.routers.personal-website-pre-prod-redirect.tls=true"
      - "traefik.http.routers.personal-website-pre-prod-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.personal-website-pre-prod-redirect.middlewares=redirect-to-www"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https://pprod.dubillaudb\\.fr(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://www.pprod.dubillaudb.fr$${1}"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"

networks:
  traefik-public:
    external: true
